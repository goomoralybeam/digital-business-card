<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="QR code placeholder">
  <rect width="280" height="280" rx="20" fill="#F4F6F8" stroke="#C9D2DC" stroke-width="2"/>
  <!-- Decorative non-QR frame markers -->
  <rect x="28" y="28" width="48" height="48" rx="6" fill="none" stroke="#1B2838" stroke-width="6"/>
  <rect x="204" y="28" width="48" height="48" rx="6" fill="none" stroke="#1B2838" stroke-width="6"/>
  <rect x="28" y="204" width="48" height="48" rx="6" fill="none" stroke="#1B2838" stroke-width="6"/>
  <rect x="52" y="52" width="16" height="16" fill="#1B2838" opacity="0.25"/>
  <rect x="228" y="52" width="16" height="16" fill="#1B2838" opacity="0.25"/>
  <rect x="52" y="228" width="16" height="16" fill="#1B2838" opacity="0.25"/>
  <!-- Centre label panel  clearly a placeholder, not a scannable code -->
  <rect x="70" y="100" width="140" height="80" rx="10" fill="#FFFFFF" stroke="#E87722" stroke-width="2"/>
  <text x="140" y="132" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#1B2838">QR available</text>
  <text x="140" y="152" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#1B2838">after publishing</text>
  <circle cx="200" cy="200" r="10" fill="#E87722" opacity="0.5"/>
  <rect x="170" y="170" width="18" height="18" rx="3" fill="#1B2838" opacity="0.15"/>
  <rect x="195" y="225" width="28" height="8" rx="2" fill="#1B2838" opacity="0.12"/>
</svg>
