<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Jason Dao · Patiotech Wholesale</title>
  <meta name="description" content="Digital business card for Jason Dao, System Administration at Patiotech Wholesale. Outdoor Living Engineered.">
  <meta name="theme-color" content="#323233">
  <meta name="author" content="Jason Dao, Patiotech Wholesale">

  <!-- Open Graph -->
  <meta property="og:title" content="Jason Dao · Patiotech Wholesale">
  <meta property="og:description" content="System Administration at Patiotech Wholesale. Outdoor Living Engineered.">
  <meta property="og:type" content="profile">
  <meta property="og:image" content="assets/cover.jpg">
  <meta property="og:locale" content="en_AU">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Jason Dao · Patiotech Wholesale">
  <meta name="twitter:description" content="System Administration at Patiotech Wholesale. Outdoor Living Engineered.">
  <meta name="twitter:image" content="assets/cover.jpg">

  <link rel="icon" href="logo.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="page">
    <article class="card" id="main">
      <header class="card-header">
        <img
          class="logo"
          src="logo.png"
          alt="Patiotech Wholesale logo"
          width="2702"
          height="521"
          decoding="async"
        >
      </header>

      <section class="qr-section" aria-labelledby="qr-heading">
        <h2 id="qr-heading" class="visually-hidden">QR code</h2>
        <a
          class="qr-link"
          id="link-qr"
          href="https://patiotechwholesale.com.au"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Scan or tap QR code to open patiotechwholesale.com.au"
        >
          <span class="qr-frame">
            <img
              class="qr-image"
              src="assets/qr-website.png"
              alt="QR code linking to patiotechwholesale.com.au"
              width="330"
              height="330"
              decoding="async"
            >
          </span>
        </a>
        <p class="qr-title">Scan for website</p>
      </section>

      <section class="visual-section" aria-label="Profile">
        <div class="cover-wrap">
          <img
            class="cover-image"
            id="cover-image"
            src="assets/cover.jpg"
            alt="Patiotech Wholesale project cover"
            width="1200"
            height="900"
            decoding="async"
          >
        </div>
        <div class="profile-wrap">
          <img
            class="profile-image"
            id="profile-image"
            src="assets/avatar.jpg"
            alt="Jason Dao"
            width="1080"
            height="1080"
            decoding="async"
          >
        </div>
      </section>

      <section class="identity" aria-labelledby="person-name">
        <h1 id="person-name" data-field="fullName">Jason Dao</h1>
        <p class="role" data-field="role">System Administration</p>
        <p class="company" data-field="company">Patiotech Wholesale</p>
      </section>

      <section class="contacts" aria-label="Contact details">
        <a class="contact-row" id="link-mobile" href="tel:+61414225210" aria-label="Call mobile +61 414 225 210">
          <span class="contact-icon" aria-hidden="true">
            <img src="assets/icons/mobile.svg" alt="" width="22" height="22">
          </span>
          <span class="contact-text">
            <span class="contact-label">Mobile</span>
            <span class="contact-value" data-field="mobileDisplay">+61 414 225 210</span>
          </span>
        </a>

        <a class="contact-row" id="link-business" href="tel:+61283800089" aria-label="Call business phone +61 2 8380 0089">
          <span class="contact-icon" aria-hidden="true">
            <img src="assets/icons/phone.svg" alt="" width="22" height="22">
          </span>
          <span class="contact-text">
            <span class="contact-label">Business</span>
            <span class="contact-value" data-field="businessDisplay">+61 2 8380 0089</span>
          </span>
        </a>

        <a class="contact-row" id="link-email" href="mailto:jason.d@patiotechwholesale.com.au" aria-label="Email jason.d@patiotechwholesale.com.au">
          <span class="contact-icon" aria-hidden="true">
            <img src="assets/icons/email.svg" alt="" width="22" height="22">
          </span>
          <span class="contact-text">
            <span class="contact-label">Email</span>
            <span class="contact-value contact-value--wrap" data-field="email">jason.d@patiotechwholesale.com.au</span>
          </span>
        </a>

        <a
          class="contact-row"
          id="link-website"
          href="https://patiotechwholesale.com.au"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Visit patiotechwholesale.com.au (opens in a new tab)"
        >
          <span class="contact-icon" aria-hidden="true">
            <img src="assets/icons/website.svg" alt="" width="22" height="22">
          </span>
          <span class="contact-text">
            <span class="contact-label">Website</span>
            <span class="contact-value contact-value--wrap" data-field="websiteDisplay">patiotechwholesale.com.au</span>
          </span>
        </a>
      </section>

      <section class="primary-actions" aria-label="Card actions">
        <a class="btn btn-primary" id="btn-save" href="contact.vcf" download="Jason-Dao-Patiotech.vcf" aria-label="Save contact as vCard">
          <img class="btn-icon" src="assets/icons/contact.svg" alt="" width="20" height="20" aria-hidden="true">
          <span>Save</span>
        </a>
        <button type="button" class="btn btn-secondary" id="btn-copy" aria-label="Copy contact details">
          <img class="btn-icon" src="assets/icons/copy.svg" alt="" width="20" height="20" aria-hidden="true">
          <span class="btn-label">Copy</span>
        </button>
        <button type="button" class="btn btn-share" id="btn-share" aria-label="Share this contact card">
          <img class="btn-icon" src="assets/icons/share.svg" alt="" width="20" height="20" aria-hidden="true">
          <span class="btn-label">Share</span>
        </button>
      </section>
    </article>
  </div>

  <div class="copy-fallback" id="copy-fallback" hidden>
    <div class="copy-fallback__panel" role="dialog" aria-modal="true" aria-labelledby="fallback-title">
      <h2 id="fallback-title">Copy details</h2>
      <p>Select and copy the text below.</p>
      <textarea id="fallback-text" readonly rows="10" aria-label="Contact details to copy"></textarea>
      <button type="button" class="btn btn-primary" id="fallback-close">Close</button>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
